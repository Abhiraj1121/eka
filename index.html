<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Swastik → Eka</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@300;400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --gold: #C9A84C;
  --gold2: #F0D080;
  --gold3: #E8C060;
  --ember: #FF6B35;
  --flame: #FF3A00;
  --crimson: #8B0000;
  --deep: #0C0608;
  --ink: #160C10;
  --ash: rgba(255,255,255,0.07);
}

html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:var(--deep);
}

/* ── CANVAS LAYER ── */
#bgCanvas {
  position:fixed; inset:0;
  width:100%; height:100%;
  z-index:0;
}

/* ── STAGE ── */
#stage {
  position:fixed; inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:10;
}

/* ── PHASE 0: SWASTIK ── */
#swastik-phase {
  position:absolute;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:24px;
}

.pre-label {
  font-family:'Rajdhani', sans-serif;
  font-size:12px;
  font-weight:600;
  letter-spacing:0.5em;
  color:rgba(201,168,76,0.5);
  text-transform:uppercase;
}

.swastik-wordmark {
  display:flex;
  gap:0px;
  position:relative;
}

.s-letter {
  font-family:'Cinzel Decorative', serif;
  font-size:clamp(52px, 10vw, 96px);
  font-weight:900;
  color:var(--gold);
  display:inline-block;
  line-height:1;
  position:relative;
  text-shadow:
    0 0 30px rgba(201,168,76,0.6),
    0 0 60px rgba(201,168,76,0.2);
  animation: letterIdle 3s ease-in-out infinite alternate;
}

.s-letter:nth-child(1){ animation-delay:0s; }
.s-letter:nth-child(2){ animation-delay:0.1s; }
.s-letter:nth-child(3){ animation-delay:0.2s; }
.s-letter:nth-child(4){ animation-delay:0.3s; }
.s-letter:nth-child(5){ animation-delay:0.4s; }
.s-letter:nth-child(6){ animation-delay:0.5s; }
.s-letter:nth-child(7){ animation-delay:0.6s; }

@keyframes letterIdle {
  from { text-shadow: 0 0 20px rgba(201,168,76,0.4), 0 0 50px rgba(201,168,76,0.15); }
  to   { text-shadow: 0 0 40px rgba(201,168,76,0.8), 0 0 80px rgba(201,168,76,0.35), 0 0 120px rgba(255,107,53,0.1); }
}

.divider-line {
  width: 200px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  opacity: 0.5;
}

.ai-badge {
  font-family:'Rajdhani', sans-serif;
  font-size:13px;
  font-weight:600;
  letter-spacing:0.4em;
  color:rgba(201,168,76,0.6);
  text-transform:uppercase;
}

/* ── SHATTER ANIMATION ── */
.s-letter.shatter {
  animation: shatterOut 0.6s cubic-bezier(0.55, 0, 1, 0.45) forwards !important;
}

.s-letter:nth-child(1).shatter{ animation-delay:0s !important; }
.s-letter:nth-child(2).shatter{ animation-delay:0.07s !important; }
.s-letter:nth-child(3).shatter{ animation-delay:0.14s !important; }
.s-letter:nth-child(4).shatter{ animation-delay:0.21s !important; }
.s-letter:nth-child(5).shatter{ animation-delay:0.28s !important; }
.s-letter:nth-child(6).shatter{ animation-delay:0.35s !important; }
.s-letter:nth-child(7).shatter{ animation-delay:0.42s !important; }

@keyframes shatterOut {
  0%   { opacity:1; transform: scale(1) rotate(0deg) translateY(0); filter:blur(0px); }
  30%  { opacity:1; transform: scale(1.3) rotate(var(--rot, 20deg)) translateY(-10px); filter:blur(0px); color:var(--flame); text-shadow: 0 0 40px var(--flame); }
  100% { opacity:0; transform: scale(0.2) rotate(var(--rot2, 90deg)) translateY(var(--ty, -120px)) translateX(var(--tx, 40px)); filter:blur(8px); }
}

/* give each letter a unique trajectory */
.s-letter:nth-child(1){ --rot:25deg; --rot2:180deg; --tx:-80px; --ty:-140px; }
.s-letter:nth-child(2){ --rot:-18deg; --rot2:-120deg; --tx:-40px; --ty:-160px; }
.s-letter:nth-child(3){ --rot:30deg; --rot2:90deg; --tx:20px; --ty:-180px; }
.s-letter:nth-child(4){ --rot:-25deg; --rot2:-200deg; --tx:0px; --ty:-200px; }
.s-letter:nth-child(5){ --rot:20deg; --rot2:150deg; --tx:30px; --ty:-170px; }
.s-letter:nth-child(6){ --rot:-30deg; --rot2:-90deg; --tx:60px; --ty:-150px; }
.s-letter:nth-child(7){ --rot:35deg; --rot2:220deg; --tx:90px; --ty:-130px; }

/* ── FLASH ── */
#flash {
  position:fixed; inset:0;
  background:radial-gradient(ellipse at center, rgba(255,180,50,0.95) 0%, rgba(255,100,0,0.6) 40%, transparent 70%);
  opacity:0;
  pointer-events:none;
  z-index:50;
}

#flash.fire {
  animation: flashBurst 0.8s ease-out forwards;
}

@keyframes flashBurst {
  0%  { opacity:0; }
  15% { opacity:1; }
  100%{ opacity:0; }
}

/* ── PHASE 1: EKA ── */
#eka-phase {
  position:absolute;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
  opacity:0;
  pointer-events:none;
}

#eka-phase.revealed {
  pointer-events:auto;
}

/* Central sigil / emblem */
.eka-emblem {
  width: 140px;
  height: 140px;
  position: relative;
  margin-bottom: 8px;
}

.emblem-ring {
  position:absolute;
  inset:0;
  border-radius:50%;
  border:1.5px solid rgba(201,168,76,0.3);
}

.emblem-ring:nth-child(1){ animation: ringRotate 12s linear infinite; }
.emblem-ring:nth-child(2){ inset:12px; border-color:rgba(201,168,76,0.5); animation: ringRotate 8s linear infinite reverse; }
.emblem-ring:nth-child(3){ inset:24px; border-color:rgba(240,208,128,0.7); animation: ringRotate 5s linear infinite; }

@keyframes ringRotate {
  from { transform:rotate(0deg); }
  to   { transform:rotate(360deg); }
}

.emblem-core {
  position:absolute;
  inset:36px;
  background:radial-gradient(circle, var(--gold2) 0%, var(--gold) 50%, rgba(201,168,76,0.3) 100%);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:
    0 0 20px rgba(240,208,128,0.8),
    0 0 50px rgba(201,168,76,0.5),
    0 0 100px rgba(201,168,76,0.2);
  animation: corePulse 3s ease-in-out infinite;
}

@keyframes corePulse {
  0%,100%{ box-shadow: 0 0 20px rgba(240,208,128,0.8), 0 0 50px rgba(201,168,76,0.5), 0 0 100px rgba(201,168,76,0.2); transform:scale(1); }
  50%    { box-shadow: 0 0 30px rgba(240,208,128,1), 0 0 70px rgba(201,168,76,0.7), 0 0 140px rgba(201,168,76,0.35); transform:scale(1.04); }
}

.core-symbol {
  font-family:'Cinzel Decorative', serif;
  font-size:22px;
  font-weight:900;
  color:var(--deep);
  line-height:1;
}

/* tick marks on emblem ring */
.emblem-ticks {
  position:absolute; inset:0;
  border-radius:50%;
}

.tick {
  position:absolute;
  width:2px;
  height:8px;
  background:var(--gold);
  top:0; left:50%;
  transform-origin:50% 70px;
  opacity:0.6;
}

/* EKA wordmark */
.eka-wordmark {
  display:flex;
  gap:4px;
  position:relative;
}

.e-letter {
  font-family:'Cinzel Decorative', serif;
  font-size:clamp(60px, 12vw, 112px);
  font-weight:900;
  display:inline-block;
  line-height:1;
  opacity:0;
  position:relative;
}

.e-letter:nth-child(1){
  color:var(--gold2);
  text-shadow: 0 0 40px rgba(240,208,128,0.9), 0 0 80px rgba(201,168,76,0.5), 0 0 160px rgba(201,168,76,0.2);
}
.e-letter:nth-child(2){
  color:var(--gold3);
  text-shadow: 0 0 40px rgba(232,192,96,0.9), 0 0 80px rgba(201,168,76,0.5);
}
.e-letter:nth-child(3){
  color:var(--gold);
  text-shadow: 0 0 40px rgba(201,168,76,0.9), 0 0 80px rgba(201,168,76,0.5);
}

.e-letter.appear {
  animation: letterArise 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
}
.e-letter:nth-child(1).appear { animation-delay:0.1s; }
.e-letter:nth-child(2).appear { animation-delay:0.3s; }
.e-letter:nth-child(3).appear { animation-delay:0.5s; }

@keyframes letterArise {
  0%   { opacity:0; transform:translateY(60px) scale(0.6); filter:blur(20px); }
  50%  { filter:blur(2px); }
  100% { opacity:1; transform:translateY(0) scale(1); filter:blur(0); }
}

/* underline accent */
.eka-underline {
  width:0;
  height:2px;
  background:linear-gradient(90deg, transparent, var(--gold), var(--gold2), var(--gold), transparent);
  margin:0 auto;
  box-shadow:0 0 12px rgba(201,168,76,0.8);
  transition: width 1.2s cubic-bezier(0.16,1,0.3,1) 1s;
}
.eka-underline.expand { width:100%; }

.eka-tagline {
  font-family:'Rajdhani', sans-serif;
  font-size:clamp(14px, 2.5vw, 19px);
  font-weight:300;
  letter-spacing:0.35em;
  color:rgba(201,168,76,0.75);
  text-transform:uppercase;
  opacity:0;
  transform:translateY(16px);
  transition: opacity 1s ease 1.6s, transform 1s ease 1.6s;
}
.eka-tagline.show { opacity:1; transform:translateY(0); }

.eka-sub {
  font-family:'Rajdhani', sans-serif;
  font-size:clamp(12px, 1.8vw, 15px);
  font-weight:400;
  letter-spacing:0.2em;
  color:rgba(255,255,255,0.4);
  opacity:0;
  transform:translateY(12px);
  transition: opacity 1s ease 2.1s, transform 1s ease 2.1s;
}
.eka-sub.show { opacity:1; transform:translateY(0); }

.india-tag {
  font-family:'Rajdhani', sans-serif;
  font-size:13px;
  font-weight:600;
  letter-spacing:0.25em;
  color:rgba(201,168,76,0.5);
  opacity:0;
  transition: opacity 0.8s ease 2.6s;
}
.india-tag.show { opacity:1; }

/* ── DEV CTA (Continue) ── */
.dev-cta {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
  margin-top:14px;
  opacity:0;
  transform:translateY(16px);
  transition: opacity 1s ease 3.1s, transform 1s ease 3.1s;
}
.dev-cta.show { opacity:1; transform:translateY(0); }

.dev-prompt {
  font-family:'Rajdhani', sans-serif;
  font-size:clamp(12px, 1.8vw, 15px);
  font-weight:400;
  letter-spacing:0.18em;
  color:rgba(255,255,255,0.45);
  text-transform:uppercase;
  text-align:center;
}

#continueBtn {
  position:relative;
  display:inline-block;
  font-family:'Rajdhani', sans-serif;
  font-size:14px;
  font-weight:700;
  letter-spacing:0.4em;
  text-transform:uppercase;
  color:var(--deep);
  background:linear-gradient(135deg, var(--gold2), var(--gold3) 50%, var(--gold));
  border:none;
  padding:15px 50px;
  border-radius:4px;
  cursor:pointer;
  overflow:hidden;
  isolation:isolate;
  box-shadow:
    0 0 18px rgba(201,168,76,0.5),
    0 0 40px rgba(201,168,76,0.25),
    inset 0 0 0 1px rgba(255,255,255,0.4);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

#continueBtn::before {
  content:'';
  position:absolute;
  top:0; left:-75%;
  width:50%; height:100%;
  background:linear-gradient(115deg, transparent, rgba(255,255,255,0.65), transparent);
  transform:skewX(-25deg);
  animation: btnShine 3.2s ease-in-out infinite;
  z-index:1;
}

@keyframes btnShine {
  0%   { left:-75%; }
  45%  { left:125%; }
  100% { left:125%; }
}

#continueBtn span {
  position:relative;
  z-index:2;
}

#continueBtn:hover {
  transform:translateY(-2px) scale(1.04);
  box-shadow:
    0 0 28px rgba(240,208,128,0.85),
    0 0 60px rgba(201,168,76,0.4),
    inset 0 0 0 1px rgba(255,255,255,0.6);
}

#continueBtn:active {
  transform:translateY(0) scale(0.97);
}

#continueBtn:disabled {
  cursor:default;
  opacity:0.6;
  transform:none !important;
}

/* ── TRANSITION OVERLAY (on Continue click) ── */
#transition-overlay {
  position:fixed; inset:0;
  background:radial-gradient(circle, var(--gold2) 0%, var(--ember) 35%, var(--crimson) 70%, transparent 100%);
  opacity:0;
  pointer-events:none;
  z-index:200;
  transform:scale(0.25);
}

#transition-overlay.active {
  animation: warpOut 0.9s cubic-bezier(0.7,0,0.3,1) forwards;
}

@keyframes warpOut {
  0%   { opacity:0; transform:scale(0.2); }
  35%  { opacity:1; transform:scale(1.3); }
  100% { opacity:1; transform:scale(7); }
}

#transition-label {
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Rajdhani', sans-serif;
  font-size:13px;
  font-weight:700;
  letter-spacing:0.5em;
  text-transform:uppercase;
  color:var(--deep);
  opacity:0;
  pointer-events:none;
  z-index:201;
}

#transition-label.active {
  animation: labelFade 0.9s ease forwards;
}

@keyframes labelFade {
  0%   { opacity:0; }
  40%  { opacity:0; }
  60%  { opacity:1; }
  100% { opacity:1; }
}

/* ── REPLAY BUTTON ── */
#replay {
  position:fixed;
  bottom:32px;
  right:32px;
  background:rgba(201,168,76,0.1);
  border:1px solid rgba(201,168,76,0.3);
  color:var(--gold);
  font-family:'Rajdhani', sans-serif;
  font-size:12px;
  font-weight:600;
  letter-spacing:0.25em;
  text-transform:uppercase;
  padding:10px 20px;
  cursor:pointer;
  border-radius:4px;
  opacity:0;
  transition:opacity 0.5s 3s, background 0.2s;
  z-index:100;
}
#replay.visible { opacity:1; }
#replay:hover { background:rgba(201,168,76,0.2); }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div id="flash"></div>
<div id="transition-overlay"></div>
<div id="transition-label">Entering Dev Build…</div>

<div id="stage">

  <!-- PHASE 0: SWASTIK -->
  <div id="swastik-phase">
    <div class="pre-label">Presenting</div>
    <div class="swastik-wordmark" id="wordmark">
      <span class="s-letter">S</span>
      <span class="s-letter">w</span>
      <span class="s-letter">a</span>
      <span class="s-letter">s</span>
      <span class="s-letter">t</span>
      <span class="s-letter">i</span>
      <span class="s-letter">k</span>
    </div>
    <div class="divider-line"></div>
    <div class="ai-badge">Artificial Intelligence</div>
  </div>

  <!-- PHASE 1: EKA -->
  <div id="eka-phase">
    <!-- Emblem -->
    <div class="eka-emblem">
      <div class="emblem-ring"></div>
      <div class="emblem-ring"></div>
      <div class="emblem-ring"></div>
      <div class="emblem-ticks" id="ticks"></div>
      <div class="emblem-core">
        <span class="core-symbol">✦</span>
      </div>
    </div>

    <!-- E K A -->
    <div class="eka-wordmark">
      <span class="e-letter">E</span>
      <span class="e-letter">K</span>
      <span class="e-letter">A</span>
    </div>

    <div class="eka-underline" id="underline"></div>
    <div class="eka-tagline" id="tagline">Intelligence · Reimagined</div>
    <div class="eka-sub" id="sub">The next evolution of AI is here</div>
    <div class="india-tag" id="india">✦ Proudly Made in India 🇮🇳 ✦</div>

    <!-- CONTINUE / DEV BUILD CTA -->
    <div class="dev-cta" id="devCta">
      <div class="dev-prompt">Want to try the dev version? Click on the button</div>
      <button id="continueBtn" type="button"><span>Continue</span></button>
    </div>
  </div>

</div>

<button id="replay" onclick="startSequence()">↺ Replay</button>

<script>
// ── BUILD TICK MARKS ──
const ticksEl = document.getElementById('ticks');
for(let i=0;i<24;i++){
  const t = document.createElement('div');
  t.className='tick';
  t.style.transform = `rotate(${i*15}deg) translateX(-50%)`;
  t.style.opacity = i%6===0 ? '0.9' : '0.3';
  t.style.height  = i%6===0 ? '10px' : '6px';
  ticksEl.appendChild(t);
}

// ── PARTICLE CANVAS ──
const canvas = document.getElementById('bgCanvas');
const ctx    = canvas.getContext('2d');
let W, H, particles=[], embers=[];

function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Background floating dust
for(let i=0;i<90;i++){
  particles.push({
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight,
    r: Math.random()*1.5+0.3,
    alpha: Math.random()*0.4+0.05,
    vx:(Math.random()-0.5)*0.3,
    vy:(Math.random()-0.5)*0.2,
    hue: Math.random()<0.6 ? 40 : 20
  });
}

function spawnEmbers(cx,cy,n){
  for(let i=0;i<n;i++){
    const angle = Math.random()*Math.PI*2;
    const speed = 2+Math.random()*6;
    embers.push({
      x:cx, y:cy,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed - 3,
      life:1, decay: 0.012+Math.random()*0.025,
      r:1.5+Math.random()*3,
      hue: 20+Math.random()*40
    });
  }
}

function drawFrame(){
  ctx.clearRect(0,0,W,H);

  // soft vignette
  const vg = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(0,0,0,0.7)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

  // dust
  for(const p of particles){
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0)p.x=W; if(p.x>W)p.x=0;
    if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`hsla(${p.hue},80%,70%,${p.alpha})`;
    ctx.fill();
  }

  // embers
  for(let i=embers.length-1;i>=0;i--){
    const e=embers[i];
    e.x+=e.vx; e.y+=e.vy;
    e.vy+=0.12; // gravity
    e.life-=e.decay;
    if(e.life<=0){ embers.splice(i,1); continue; }
    ctx.beginPath();
    ctx.arc(e.x,e.y,e.r*e.life,0,Math.PI*2);
    ctx.fillStyle=`hsla(${e.hue},100%,65%,${e.life*0.9})`;
    ctx.fill();
  }

  requestAnimationFrame(drawFrame);
}
drawFrame();

// ── MAIN SEQUENCE ──
let sequenceRunning=false;

function startSequence(){
  if(sequenceRunning) return;
  sequenceRunning=true;

  const swastikPhase = document.getElementById('swastik-phase');
  const ekaPhase     = document.getElementById('eka-phase');
  const replay       = document.getElementById('replay');
  const flashEl      = document.getElementById('flash');
  const devCta       = document.getElementById('devCta');
  const continueBtn  = document.getElementById('continueBtn');

  // Reset all
  replay.classList.remove('visible');
  ekaPhase.style.opacity='0';
  ekaPhase.classList.remove('revealed');
  document.querySelectorAll('.e-letter').forEach(l=>l.classList.remove('appear'));
  document.getElementById('underline').classList.remove('expand');
  ['tagline','sub','india'].forEach(id=>document.getElementById(id).classList.remove('show'));
  devCta.classList.remove('show');
  continueBtn.disabled = false;

  swastikPhase.style.opacity='1';
  swastikPhase.style.pointerEvents='auto';
  document.querySelectorAll('.s-letter').forEach(l=>{
    l.classList.remove('shatter');
    l.style.opacity='1';
    l.style.animation='';
  });

  // Force reflow
  void swastikPhase.offsetWidth;

  // Idle glow for 2.5s
  setTimeout(()=>{
    // Trigger shatter
    document.querySelectorAll('.s-letter').forEach(l => l.classList.add('shatter'));

    // Burst embers from word position
    const wm = document.getElementById('wordmark');
    const rect = wm.getBoundingClientRect();
    spawnEmbers(rect.left+rect.width/2, rect.top+rect.height/2, 120);

    // Flash
    setTimeout(()=>{
      flashEl.classList.remove('fire');
      void flashEl.offsetWidth;
      flashEl.classList.add('fire');
    }, 300);

    // Hide swastik
    setTimeout(()=>{
      swastikPhase.style.opacity='0';
      swastikPhase.style.pointerEvents='none';
    }, 700);

    // Reveal EKA
    setTimeout(()=>{
      ekaPhase.style.opacity='1';
      ekaPhase.classList.add('revealed');

      // More embers as EKA appears
      spawnEmbers(W/2, H/2, 80);

      // Stagger letter animations
      document.querySelectorAll('.e-letter').forEach(l=>l.classList.add('appear'));

      // Underline
      setTimeout(()=>document.getElementById('underline').classList.add('expand'), 600);

      // Text reveals
      setTimeout(()=>document.getElementById('tagline').classList.add('show'), 1600);
      setTimeout(()=>document.getElementById('sub').classList.add('show'), 2100);
      setTimeout(()=>document.getElementById('india').classList.add('show'), 2600);

      // Continue / dev build CTA
      setTimeout(()=>devCta.classList.add('show'), 3100);

      // Replay button
      setTimeout(()=>{
        replay.classList.add('visible');
        sequenceRunning=false;
      }, 3400);

    }, 1000);

  }, 2500);
}

// ── CONTINUE BUTTON: TRANSACTION / TRANSITION EFFECT ──
document.getElementById('continueBtn').addEventListener('click', function(e){
  e.preventDefault();
  if(this.disabled) return;
  this.disabled = true;

  const overlay = document.getElementById('transition-overlay');
  const label   = document.getElementById('transition-label');

  // Restart animations
  overlay.classList.remove('active');
  label.classList.remove('active');
  void overlay.offsetWidth;
  overlay.classList.add('active');
  label.classList.add('active');

  // Burst of embers from the button
  const rect = this.getBoundingClientRect();
  spawnEmbers(rect.left+rect.width/2, rect.top+rect.height/2, 150);

  // Navigate after the warp transition completes
  setTimeout(()=>{
    window.location.href = 'https://abhiraj1121.github.io/eka-dev1';
  }, 850);
});

// Start on load
window.addEventListener('load', ()=>{
  setTimeout(startSequence, 500);
});
</script>
